name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint + format ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check restorax/ tests/

      - name: Lint
        run: ruff check restorax/ tests/

  # ── Type checking ─────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps for type checking
        run: |
          pip install mypy pydantic pydantic-settings \
            "sqlalchemy[asyncio]" celery redis fastapi \
            types-pyyaml types-redis click

      - name: mypy
        run: mypy restorax/ --ignore-missing-imports --no-strict-optional

  # ── Unit tests ────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies (CPU torch)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install basicsr av opencv-python-headless
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short \
            --cov=restorax --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ── Integration + system tests ────────────────────────────────────────────────
  integration-tests:
    name: Integration & System Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies (CPU torch)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install basicsr av opencv-python-headless
          pip install -e ".[dev]"

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short

      - name: Run system tests
        run: python -m pytest tests/system/ -v --tb=short

  # ── Frontend tests ────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Frontend build ────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest
    needs: frontend-tests
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

  # ── Docker build ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: restorax:ci

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: restorax-worker:ci
