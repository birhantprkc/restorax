site_name: RestoraX
site_description: Open-source AI video & audio restoration platform — 25 models, Pipeline DAG, ComfyUI node pack
site_author: RestoraX Contributors
repo_url: https://github.com/karailker/restorax
repo_name: karailker/restorax

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - attr_list

nav:
  - Home: index.md
  - Sample Restorations: samples.md
  - Getting Started:
    - Installation: guides/installation.md
    - Quick Start: guides/quickstart.md
    - Configuration: guides/configuration.md
  - Guides:
    - Writing a Plugin: guides/plugins.md
    - Multi-GPU Setup: guides/multi_gpu.md
    - Fine-tuning: guides/finetuning.md
